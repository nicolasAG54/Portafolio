<section id="experiencia" class="section experience">
  <div class="container">
    <app-section-title
      eyebrow="Experiencia"
      title="Experiencia frontend aplicada a entornos reales"
      description="Trabajos recientes donde he contribuido al desarrollo y mantenimiento de aplicaciones empresariales, con foco en calidad, escalabilidad y colaboración cercana con equipos multidisciplinarios."
    />

    <div class="timeline">
      @for (item of experience; track item.company + item.period) {
        <article class="timeline__item card">
          <div class="timeline__meta">
            <span>{{ item.period }}</span>
            <strong>{{ item.company }}</strong>
          </div>
          <div>
            <h3>{{ item.role }}</h3>
            <p>{{ item.summary }}</p>
            <ul>
              @for (achievement of item.achievements; track achievement) {
                <li>{{ achievement }}</li>
              }
            </ul>
            <div class="timeline__stack">
              @for (tech of item.stack; track tech) {
                <span>{{ tech }}</span>
              }
            </div>
          </div>
        </article>
      }
    </div>
  </div>
</section>
