<section id="sobre-mi" class="section about">
  <div class="container about__grid">
    <div class="about__copy">
      <app-section-title
        eyebrow="Sobre mí"
        title="Frontend orientado a producto, calidad y escalabilidad"
        [description]="profile.recruiterPitch"
      />

      <ul class="about__highlights" aria-label="Fortalezas profesionales">
        <li>Interfaces empresariales claras, mantenibles y pensadas para usuarios reales.</li>
        <li>Componentes reutilizables con Angular moderno, TypeScript, SCSS y buenas prácticas.</li>
        <li>Mejora de UX/UI, consumo de APIs y pruebas E2E para reducir regresiones.</li>
      </ul>
    </div>

    <figure class="about__visual card">
      <img
        src="/assets/images/about-web-interface.png"
        width="1254"
        height="1254"
        alt="Mockup minimalista de una interfaz web moderna"
        loading="lazy"
      >
      <figcaption>UI empresarial · Angular · UX mantenible</figcaption>
    </figure>
  </div>
</section>
